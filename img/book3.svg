  <line x1="106" y1="95" x2="141" y2="95" stroke="#f5a623" stroke-width="0.6" opacity="0.4"/>
  <line x1="100" y1="101" x2="100" y2="138" stroke="#f5a623" stroke-width="0.6" opacity="0.4"/>
  <line x1="94" y1="95" x2="59" y2="95" stroke="#f5a623" stroke-width="0.6" opacity="0.4"/>
